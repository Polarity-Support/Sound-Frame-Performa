<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harmoniq | Sound Frame — Investor Proforma</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f7f5f1; font-family: 'Inter', sans-serif; }
    button { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react" data-plugins="transform-class-properties">
    const { useState, useEffect, useRef } = React;

    // ─── Shared Constants ────────────────────────────────────────────────────────
    const AMOUNT       = 75000;
    const LOAN_TERM    = 36;
    const GRACE        = 12;
    const RATE         = 0.08;
    // ── Product Pricing — Size Tiers ──────────────────────────────────────────
    // CI dealer cost = 80% of MSRP across all sizes (Sonos/Ubiquiti thin-margin model).
    // Dealer makes real money on the amp + labor, not the hardware.
    // COGS scales with frame perimeter across TV sizes.
    const CI_MARGIN = 0.80;
    const SIZE_TIERS = [
      { size:'55"', msrp:3500, cogs:1200, mix:0.10 },  // same MSRP as 65" — smaller frame, better GP
      { size:'65"', msrp:3500, cogs:1400, mix:0.30 },
      { size:'75"', msrp:4000, cogs:1625, mix:0.35 },  // expected bestseller
      { size:'85"', msrp:5000, cogs:1850, mix:0.20 },
      { size:'98"', msrp:6500, cogs:2100, mix:0.05 },  // premium, lowest volume
    ].map(t => ({ ...t, ciPrice: Math.round(t.msrp * CI_MARGIN), gp: Math.round(t.msrp * CI_MARGIN) - t.cogs }));

    // Size-weighted blended figures across expected sales mix
    const BLEND_REV = Math.round(SIZE_TIERS.reduce((a,t) => a + t.ciPrice * t.mix, 0));
    const BLEND_GP  = Math.round(SIZE_TIERS.reduce((a,t) => a + t.gp     * t.mix, 0));
    const COGS      = Math.round(SIZE_TIERS.reduce((a,t) => a + t.cogs   * t.mix, 0));

    // 65" anchor refs for display
    const MSRP      = 3500;
    const CI_PRICE  = Math.round(MSRP * CI_MARGIN); // $2,800
    const DTC_PRICE = MSRP; // conditional future channel only

    const BLEND_REV_Y12 = BLEND_REV;
    const BLEND_GP_Y12  = BLEND_GP;
    const BLEND_REV_Y3  = BLEND_REV;
    const BLEND_GP_Y3   = BLEND_GP;
    const OP_EXP_RATE  = 0.18;

    // ─── Loan Calcs ──────────────────────────────────────────────────────────────
    const accruedBal  = AMOUNT * Math.pow(1 + RATE / 12, GRACE);
    const repayMonths = LOAN_TERM - GRACE;
    const monthlyPmt  = (() => {
      const r = RATE / 12;
      return (accruedBal * r) / (1 - Math.pow(1 + r, -repayMonths));
    })();
    const graceInt = accruedBal - AMOUNT;
    const totalInt = graceInt + (monthlyPmt * repayMonths - accruedBal);

    // ─── Equity Options ──────────────────────────────────────────────────────────
    const RECOMMENDED_PREMONEY = 200000;
    const RECOMMENDED_EQUITY   = 75000 / (200000 + 75000);
    const EQUITY_OPTIONS = [
      { pct: 0.23, label: "23%", preMoney: 250000, note: "Founder-favorable — top of honest range" },
      { pct: 0.27, label: "27%", preMoney: 200000, note: "Recommended — mid honest range" },
      { pct: 0.33, label: "33%", preMoney: 150000, note: "Investor-favorable — bottom of honest range" },
      { pct: 0.38, label: "38%", preMoney: 120000, note: "Aggressive investor ask" },
    ];
    const EXIT_MULTIPLES = [2, 4, 6, 8];

    // ─── Scenarios ───────────────────────────────────────────────────────────────
    const SCENARIOS = {
      conservative: { label: "Conservative", sub: "Avg 1–2 units/month, slow ramp", accent: "#92400e", yr1: 26,  yr2: 42,  yr3: 60  },
      base:         { label: "Base",         sub: "Scaling to 5–6 units/month by Year 1 end", accent: "#1e3a5f", yr1: 38, yr2: 72, yr3: 108 },
      optimistic:   { label: "Optimistic",   sub: "Fast ramp — dedicated production by Q3", accent: "#4a1d6b", yr1: 62, yr2: 120, yr3: 180 },
    };

    const FUNDS = [
      { item: "CAD Engineering & Design", pct: 27, amount: 20000, note: '3D modeling, tolerancing, spec sheets — 55", 65", 75" variants' },
      { item: "Cabinet Maker Prototypes", pct: 33, amount: 25000, note: "Production-quality samples across all three frame sizes" },
      { item: "Trade Secret & IP Protection", pct: 20, amount: 15000, note: "Proprietary crossover PCB legal documentation, manufacturer NDAs, prior art date establishment, and trade secret protocols" },
      { item: "Website & Trade Marketing",pct: 11, amount:  8000, note: "E-commerce build-out, trade collateral, product photography" },
      { item: "Audio Components / R&D",   pct:  5, amount:  4000, note: "Speaker driver sourcing and acoustic refinement" },
      { item: "Contingency Reserve",      pct:  4, amount:  3000, note: "Cost overruns, supplier revisions, unforeseen expenses" },
    ];

    const fmt$ = n => "$" + Math.round(n).toLocaleString();
    const fmtX = n => n.toFixed(1) + "x";

    // ─── Palette ─────────────────────────────────────────────────────────────────
    const C = {
      bg: "#f7f5f1", bgCard: "#ffffff", bgSubtle: "#f2efe9",
      border: "#e5dfd5", borderMid: "#d5cec2",
      navy: "#1a2b3c", gold: "#b8943a", goldLight: "#fdf6e3", goldBorder: "#e8d08a",
      positive: "#2d5a3d", positiveBg: "#f0f7f3", positiveBdr: "#a8d4b8",
      warning: "#7c3500", warningBg: "#fef6ec", warningBdr: "#f5c87a",
      muted: "#8a8070", body: "#2e2a24", sub: "#5a5248",
    };

    // ─── Shared Components ───────────────────────────────────────────────────────
    function ScrollTable({ children, style = {} }) {
      const [showHint, setShowHint] = useState(true);
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const check = () => setShowHint(el.scrollLeft < 10 && el.scrollWidth > el.clientWidth + 4);
        check();
        el.addEventListener("scroll", check);
        window.addEventListener("resize", check);
        return () => { el.removeEventListener("scroll", check); window.removeEventListener("resize", check); };
      }, []);
      return (
        <div style={{ position: "relative" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:6, marginBottom:8, opacity: showHint ? 1 : 0, transition:"opacity .3s", pointerEvents:"none" }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            <span style={{ fontSize:11, color:C.muted, letterSpacing:1.5, textTransform:"uppercase", fontWeight:600 }}>Slide to scroll</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </div>
          <div ref={ref} style={{ overflowX:"auto", borderRadius:12, border:`1px solid ${C.border}`, background:"#fff", boxShadow:"0 1px 3px rgba(0,0,0,0.04)", ...style }}>
            {children}
          </div>
          <div style={{ position:"absolute", bottom:0, right:0, width:48, height:"calc(100% - 30px)", background:"linear-gradient(to right, transparent, rgba(255,255,255,0.95))", borderRadius:"0 12px 12px 0", pointerEvents:"none", opacity: showHint ? 1 : 0, transition:"opacity .3s" }} />
        </div>
      );
    }

    function Eyebrow({ children }) {
      return <div style={{ fontSize:10, letterSpacing:4, textTransform:"uppercase", color:C.gold, marginBottom:12, fontWeight:600 }}>{children}</div>;
    }
    function H2({ children }) {
      return <div style={{ fontFamily:"'Playfair Display',serif", fontSize:31, color:C.navy, marginBottom:28, fontWeight:600, lineHeight:1.2 }}>{children}</div>;
    }
    function Card({ children, style }) {
      return <div style={{ background:C.bgCard, border:`1px solid ${C.border}`, borderRadius:12, padding:"22px 26px", boxShadow:"0 1px 3px rgba(0,0,0,0.04)", ...style }}>{children}</div>;
    }
    function Section({ children }) {
      return <div style={{ maxWidth:900, margin:"0 auto", padding:"48px 24px", borderBottom:`1px solid ${C.border}` }}>{children}</div>;
    }
    function Notice({ children, type = "warn" }) {
      const s = { warn:{ bg:C.warningBg, border:C.warningBdr, color:C.warning }, gold:{ bg:C.goldLight, border:C.goldBorder, color:"#5a420a" }, success:{ bg:C.positiveBg, border:C.positiveBdr, color:C.positive } }[type];
      return <div style={{ padding:"14px 18px", background:s.bg, border:`1px solid ${s.border}`, borderRadius:10, fontSize:13, color:s.color, lineHeight:1.75, marginTop:14 }}>{children}</div>;
    }
    function ScenarioTabs({ value, onChange }) {
      return (
        <div style={{ display:"flex", gap:10, marginBottom:20, flexWrap:"wrap" }}>
          {Object.entries(SCENARIOS).map(([key, s]) => (
            <button key={key} onClick={() => onChange(key)}
              style={{ border:`1.5px solid ${value===key ? s.accent : C.border}`, background:value===key ? C.bgSubtle : C.bgCard, color:value===key ? s.accent : C.muted, padding:"11px 18px", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:500, textAlign:"left", transition:"all .15s" }}>
              <div style={{ fontWeight:600 }}>{s.label}</div>
              <div style={{ fontSize:11, opacity:0.7, marginTop:2 }}>{s.sub}</div>
            </button>
          ))}
        </div>
      );
    }
    function PillBtn({ active, onClick, children }) {
      return <button onClick={onClick} style={{ border:`1.5px solid ${active ? C.navy : C.border}`, background:active ? C.navy : C.bgCard, color:active ? "#fff" : C.muted, padding:"9px 18px", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:600, transition:"all .15s" }}>{children}</button>;
    }
    function MetricGrid({ items }) {
      return (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(148px, 1fr))", gap:12 }}>
          {items.map(m => (
            <Card key={m.lbl} style={m.highlight ? { background: m.highlight==="gold" ? C.goldLight : C.positiveBg, border:`1px solid ${m.highlight==="gold" ? C.goldBorder : C.positiveBdr}` } : {}}>
              <div style={{ fontFamily:"'Playfair Display',serif", fontSize:24, color:m.highlight==="gold" ? C.gold : m.highlight==="pos" ? C.positive : C.navy, fontWeight:700 }}>{m.val}</div>
              <div style={{ fontSize:10, letterSpacing:2, textTransform:"uppercase", color:C.muted, marginTop:6 }}>{m.lbl}</div>
            </Card>
          ))}
        </div>
      );
    }
    function FundsTable() {
      const TH = { textAlign:"left", padding:"10px 14px", fontSize:10, letterSpacing:2, textTransform:"uppercase", color:C.muted, borderBottom:`2px solid ${C.bgSubtle}`, fontWeight:600, background:"#faf8f4" };
      return (
        <>
          <ScrollTable>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead><tr>{["Line Item","Amount","Allocation","Purpose"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
              <tbody>
                {FUNDS.map((f,i) => (
                  <tr key={i}>
                    <td style={{ padding:"13px 14px", borderBottom:`1px solid ${C.bgSubtle}`, color:C.body, fontWeight:600 }}>{f.item}</td>
                    <td style={{ padding:"13px 14px", borderBottom:`1px solid ${C.bgSubtle}` }}><span style={{ color:C.navy, fontWeight:600 }}>{fmt$(f.amount)}</span></td>
                    <td style={{ padding:"13px 14px", borderBottom:`1px solid ${C.bgSubtle}`, minWidth:120 }}>
                      <span style={{ color:C.muted, fontSize:12 }}>{f.pct}%</span>
                      <div style={{ background:C.bgSubtle, borderRadius:4, height:5, marginTop:7 }}><div style={{ width:f.pct+"%", background:C.navy, borderRadius:4, height:5 }} /></div>
                    </td>
                    <td style={{ padding:"13px 14px", borderBottom:`1px solid ${C.bgSubtle}`, color:C.muted, fontSize:12, lineHeight:1.6 }}>{f.note}</td>
                  </tr>
                ))}
                <tr style={{ background:C.bgSubtle }}>
                  <td style={{ padding:"13px 14px", color:C.body, fontWeight:700 }}>Total</td>
                  <td style={{ padding:"13px 14px" }}><span style={{ color:C.navy, fontWeight:700, fontSize:15 }}>{fmt$(AMOUNT)}</span></td>
                  <td style={{ padding:"13px 14px" }}><span style={{ color:C.navy, fontWeight:600 }}>100%</span></td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          </ScrollTable>
          <Notice type="warn"><strong>⚠ Note:</strong> Cabinet maker and IP costs are estimates. Utility patent prosecution extends 2–3 years beyond this raise and will require additional budget not captured here.</Notice>
        </>
      );
    }
    function AssumptionsGrid() {
      const assumptions = [
        { lbl:'MSRP / End Customer Price (65")', val:"$3,500",  note:"What customer pays dealer — dealer adds install labor separately" },
        { lbl:"CI Dealer Cost (80% of MSRP)",     val:"$2,800+", note:"80% across all sizes — 65\" anchor $2,800, up to $5,200 for 98\"" },
        { lbl:"Est. COGS / Unit",                 val:"$1,400",  note:"~40% of MSRP · pending cabinet maker quotes" },
        { lbl:"Primary Channel",                  val:"CI Only", note:"CI dealer channel — professional install required, warranty enforced on all units" },
        { lbl:"DTC Channel",                      val:"Conditional", note:"Only pursued if rapid demand growth signals emerge by mid-to-late Year 2 — not a baseline assumption" },
        { lbl:"Revenue / Unit (All Years)",       val:"$2,100",  note:"CI dealer price — Harmoniq's recognized revenue per unit across all modeled years" },
        { lbl:"65\" Anchor GP / Unit",            val:"$1,400",  note:"$2,800 − $1,400 COGS. See Pricing Tiers above for full size breakdown." },
        { lbl:"Blended GP / Unit",               val:fmt$(BLEND_GP), note:"Size-weighted across expected mix — improves as larger installs grow." },
      ];
      return (
        <>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(210px, 1fr))", gap:12 }}>
            {assumptions.map(a => (
              <Card key={a.lbl}>
                <div style={{ fontSize:11, color:C.muted, marginBottom:8, fontWeight:500 }}>{a.lbl}</div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:24, color:C.navy, fontWeight:700 }}>{a.val}</div>
                <div style={{ color:C.muted, fontSize:12, lineHeight:1.65, marginTop:8 }}>{a.note}</div>
              </Card>
            ))}
          </div>
          <Notice type="warn"><strong>Critical Assumption:</strong> COGS of $1,400/unit (40% of retail) is unvalidated. If actual COGS lands at 50–55% of retail, gross profit per unit drops to $875–$1,050 — narrowing margin materially. Cabinet maker quotes required before committing to a production run.</Notice>
        </>
      );
    }
    function RiskList({ items }) {
      return <>{items.map(r => (
        <div key={r.title} style={{ padding:"15px 20px", borderLeft:`3px solid ${C.borderMid}`, background:C.bgCard, border:`1px solid ${C.border}`, borderRadius:"0 10px 10px 0", marginBottom:10, fontSize:13, color:C.sub, lineHeight:1.7 }}>
          <div style={{ color:C.body, fontWeight:600, marginBottom:4 }}>{r.title}</div>
          {r.body}
        </div>
      ))}</>;
    }



    // ─── Product Pricing Tiers ────────────────────────────────────────────────
    function PricingTiers() {
      const TH = { textAlign:"left", padding:"10px 14px", fontSize:10, letterSpacing:2, textTransform:"uppercase", color:C.muted, borderBottom:"2px solid "+C.bgSubtle, fontWeight:600, background:"#faf8f4" };
      return (
        <Section>
          <Eyebrow>Product Pricing</Eyebrow>
          <H2>Size Tiers — 20% Dealer Margin Across All Sizes</H2>
          <p style={{ fontSize:13, color:C.muted, lineHeight:1.75, marginBottom:20 }}>
            Harmoniq pricing scales with TV size. CI dealer cost is fixed at <strong style={{color:C.navy}}>80% of MSRP across every size</strong> — the same structure as the 65" anchor. COGS scales proportionally with frame perimeter. Gross profit improves significantly at larger sizes, and the blended GP across expected sales mix exceeds the 65" baseline.
          </p>
          <ScrollTable style={{ marginBottom:16 }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead><tr>{["TV Size","MSRP","CI Dealer Cost (80%)","Dealer Margin","Est. COGS","Harmoniq GP","Sales Mix"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
              <tbody>
                {SIZE_TIERS.map((t,i) => (
                  <tr key={t.size} style={{ background: t.size==='65"' ? C.goldLight : i%2===0 ? C.bgCard : C.bgSubtle }}>
                    <td style={{ padding:"13px 14px", borderBottom:"1px solid "+C.bgSubtle, color:C.body, fontWeight:t.size==='65"'?700:500 }}>
                      {t.size}{t.size==='65"' && <span style={{ fontSize:10, color:C.gold, fontWeight:600, letterSpacing:1, marginLeft:8 }}>ANCHOR</span>}
                    </td>
                    <td style={{ padding:"13px 14px", borderBottom:"1px solid "+C.bgSubtle }}><span style={{ color:C.navy, fontWeight:600 }}>{fmt$(t.msrp)}</span></td>
                    <td style={{ padding:"13px 14px", borderBottom:"1px solid "+C.bgSubtle }}><span style={{ color:C.navy, fontWeight:600 }}>{fmt$(t.ciPrice)}</span></td>
                    <td style={{ padding:"13px 14px", borderBottom:"1px solid "+C.bgSubtle, color:C.muted }}>20% / {fmt$(t.msrp - t.ciPrice)}</td>
                    <td style={{ padding:"13px 14px", borderBottom:"1px solid "+C.bgSubtle, color:C.muted }}>{fmt$(t.cogs)} <span style={{ fontSize:10 }}>*est.</span></td>
                    <td style={{ padding:"13px 14px", borderBottom:"1px solid "+C.bgSubtle }}><span style={{ color:C.positive, fontWeight:700 }}>{fmt$(t.gp)}</span></td>
                    <td style={{ padding:"13px 14px", borderBottom:"1px solid "+C.bgSubtle, color:C.sub }}>{Math.round(t.mix*100)}%</td>
                  </tr>
                ))}
                <tr style={{ background:C.bgSubtle }}>
                  <td style={{ padding:"13px 14px", color:C.body, fontWeight:700 }}>Blended Average</td>
                  <td style={{ padding:"13px 14px" }}><span style={{ color:C.navy, fontWeight:700 }}>{fmt$(Math.round(SIZE_TIERS.reduce((a,t)=>a+t.msrp*t.mix,0)))}</span></td>
                  <td style={{ padding:"13px 14px" }}><span style={{ color:C.navy, fontWeight:700 }}>{fmt$(BLEND_REV)}</span></td>
                  <td style={{ padding:"13px 14px", color:C.muted }}>20% / {fmt$(Math.round(SIZE_TIERS.reduce((a,t)=>a+(t.msrp-t.ciPrice)*t.mix,0)))}</td>
                  <td style={{ padding:"13px 14px", color:C.muted }}>{fmt$(COGS)}</td>
                  <td style={{ padding:"13px 14px" }}><span style={{ color:C.positive, fontWeight:700, fontSize:15 }}>{fmt$(BLEND_GP)}</span></td>
                  <td style={{ padding:"13px 14px", color:C.muted }}>100%</td>
                </tr>
              </tbody>
            </table>
          </ScrollTable>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(155px, 1fr))", gap:12, marginBottom:16 }}>
            {[
              { lbl:'65" Anchor GP',      val:fmt$(SIZE_TIERS.find(t=>t.size==='65"').gp), note:"Base model — most common CI install" },
              { lbl:"Blended GP / Unit",  val:fmt$(BLEND_GP),                              note:"Weighted across expected size mix" },
              { lbl:'98" GP / Unit',      val:fmt$(SIZE_TIERS.find(t=>t.size==='98"').gp), note:"Premium install — strongest margin" },
              { lbl:"CI Margin All Sizes",val:"20%",                                       note:"Same dealer % regardless of TV size" },
            ].map(s => (
              <Card key={s.lbl}>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, color:C.navy, fontWeight:700 }}>{s.val}</div>
                <div style={{ fontSize:10, letterSpacing:2, textTransform:"uppercase", color:C.muted, marginTop:6 }}>{s.lbl}</div>
                <div style={{ fontSize:11, color:C.muted, lineHeight:1.5, marginTop:6 }}>{s.note}</div>
              </Card>
            ))}
          </div>
          <Notice type="warn">
            <strong>* COGS estimates</strong> are proportional to frame perimeter and have not been validated with cabinet maker quotes. The 65" figure ($1,400) is the most-tested estimate. Larger size COGS should be confirmed before committing to dealer pricing on those tiers. GP improves significantly at larger sizes even under conservative COGS assumptions.
          </Notice>
        </Section>
      );
    }

    // ─── Market Validation Component (shared) ─────────────────────────────────
    function MarketValidation() {
      const [showNote, setShowNote] = React.useState(false);
      return (
        <Section>
          <Eyebrow>Market Validation</Eyebrow>
          <H2>Proven Market. Dramatically Underserved Price Point.</H2>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(185px, 1fr))", gap:12, marginBottom:24 }}>
            {[
              { brand:"NextLevel Acoustics", product:"Audio Art — LCR (any size)", price:"$10,000+", sub:"Starting price. Amplifier not included.", color:C.muted, bg:C.bgSubtle, border:C.border },
              { brand:"NextLevel Acoustics", product:"Audio Art — Stereo (any size)", price:"$9,600+", sub:"Starting price. Amplifier not included.", color:C.muted, bg:C.bgSubtle, border:C.border },
              { brand:"NextLevel Acoustics", product:'Audio Art — Dealer Cost (65")', price:"$6,800+", sub:"CI dealer channel only — consumer pays more.", color:C.muted, bg:C.bgSubtle, border:C.border },
              { brand:"Harmoniq / Sound Frame", product:'Sound Frame — Stereo (65")', price:"$3,500", sub:"65\" anchor MSRP. 55\"–98\" available. Harmoniq earns $2,800–$5,200 by size.", color:C.navy, bg:C.goldLight, border:C.goldBorder },
            ].map(c => (
              <div key={c.product} style={{ background:c.bg, border:"1px solid "+c.border, borderRadius:12, padding:"18px 20px" }}>
                <div style={{ fontSize:10, letterSpacing:2, textTransform:"uppercase", color:C.muted, fontWeight:600, marginBottom:4 }}>{c.brand}</div>
                <div style={{ fontSize:11, color:C.sub, marginBottom:10, lineHeight:1.4 }}>{c.product}</div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:28, color:c.color, fontWeight:700 }}>{c.price}</div>
                <div style={{ fontSize:11, color:C.muted, marginTop:8, lineHeight:1.5, fontStyle:"italic" }}>{c.sub}</div>
              </div>
            ))}
          </div>

          <Card style={{ marginBottom:16 }}>
            <div style={{ fontSize:11, letterSpacing:2, textTransform:"uppercase", color:C.gold, fontWeight:600, marginBottom:12 }}>The Competitive Case</div>
            <p style={{ fontSize:14, lineHeight:1.95, color:C.sub, marginBottom:16 }}>
              NextLevel Acoustics (NLA) is the only company currently selling a full TV-surround speaker frame system. Their flagship <strong style={{color:C.navy}}>Audio Art</strong> launched at CEDIA 2025 with publicly confirmed starting prices of <strong style={{color:C.navy}}>$9,600 for Stereo and $10,000 for LCR configurations</strong>. Like Sound Frame, the Audio Art is a passive system — <strong style={{color:C.navy}}>both products require an external amplifier</strong> (Audio Art specs: 35–300W recommended). NLA targets the custom installer (CI) dealer channel, where a dedicated amplifier in an AV rack is standard. NLA is a bootstrapped 1–10 person company that has operated profitably in this niche for over 10 years without a single dollar of outside investment — the clearest proof this market exists and sustains a business.
            </p>

                    <td style={{padding:"13px 14px",borderBottom:`1px solid ${C.bgSubtle}`}}><span style={{color:C.navy,fontWeight:600}}>{fmt$(e.companyVal)}</span></td>

                    <td style={{padding:"13px 14px",borderBottom:`1px solid ${C.bgSubtle}`}}><span style={{background:moicBg,color:moicClr,border:`1px solid ${moicBdr}`,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700}}>{fmtX(e.moic)}</span></td>
                    <td style={{padding:"13px 14px",borderBottom:`1px solid ${C.bgSubtle}`}}><span style={{color:e.moic>=1?C.positive:"#991b1b",fontWeight:600}}>{e.moic>=1?"+":"–"}{fmt$(Math.abs(e.investorVal-AMOUNT))}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </ScrollTable>
        <Notice type="gold"><strong>How to read MOIC:</strong> Multiple on Invested Capital — how many times the investor gets their money back. A 4× MOIC on {fmt$(AMOUNT)} returns {fmt$(AMOUNT*4)}. Consumer hardware with strong IP typically trades at <strong>2–5× revenue</strong> at acquisition. A 6–8× multiple reflects premium positioning and strong traction.</Notice>
      </Section>

      {/* Profit distributions */}
      <Section>
        <Eyebrow>Section D</Eyebrow>
        <H2>Profit Distribution Potential</H2>
        <p style={{fontSize:13,color:C.muted,lineHeight:1.75,marginBottom:20}}>Equity holders may receive distributions from net profit in addition to an exit event. Below is the investor's proportional share of cumulative estimated net profit through Year {exitYr}, under each scenario.</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:12}}>
          {Object.entries(SCENARIOS).map(([key,s])=>{
            const cumNet=[s.yr1,s.yr2,s.yr3].slice(0,exitYr).map(u=>u*BLEND_GP-u*BLEND_REV*OP_EXP_RATE).reduce((a,b)=>a+b,0);
            const share=cumNet*eq.pct;
            return (
              <Card key={key} style={{borderTop:`3px solid ${s.accent}`}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>{s.label}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:cumNet>=0?C.navy:"#991b1b",fontWeight:700}}>{cumNet>=0?fmt$(share):"Net loss period"}</div>
                <div style={{color:C.muted,fontSize:12,lineHeight:1.65,marginTop:6}}>Investor's {eq.label} of {fmt$(Math.max(0,cumNet))} cumulative net profit · Yrs 1–{exitYr}</div>
              </Card>
            );
          })}
        </div>
        <Notice type="warn"><strong>Important:</strong> Profit distributions are not guaranteed. They are subject to company cash flow, operating needs, and mutual agreement. These figures are modeled estimates, not committed distributions.</Notice>
      </Section>

      {/* Risks */}
      <Section>
        <Eyebrow>Section E</Eyebrow>
        <H2>Key Risks & Material Disclosures</H2>
        <RiskList items={[
          {title:"Equity Carries No Guaranteed Return",body:"Unlike a loan, this investment has no fixed repayment date, interest rate, or guaranteed return. The investor's return depends entirely on company performance and a future exit event or profit distributions — neither of which is guaranteed."},
          {title:"Pre-Revenue Company",body:"Sound Frame has no revenue history. All projections are forward-looking estimates based on market assumptions, not operational performance."},
          {title:"Valuation Is Negotiated, Not Independently Verified",body:"The pre-money valuation reflects a negotiated figure, not a third-party appraisal. Investors are encouraged to perform independent due diligence on the valuation methodology."},
          {title:"COGS Not Yet Validated",body:"Unit cost of $1,400 (~40% of retail) is an unconfirmed estimate. Actual cabinet maker quotes could shift this significantly, compressing gross margin and affecting net profit projections."},
          {title:"Price Point Unvalidated at Market",body:"A $3,500 retail price has not been tested with end consumers. Discounting to drive adoption would reduce revenue and net profit, directly impacting investor return projections."},
          {title:"Exit Event Is Not Guaranteed",body:"There is no committed timeline or mechanism for an exit event. An acquisition or buyout depends on market conditions, company growth, and third-party interest — all outside the founders' full control."},
          {title:"IP Filing Is Not IP Protection",body:"A provisional patent secures a 12-month priority window only. Utility patent prosecution is multi-year, costly, and not guaranteed to result in issuance."},
          {title:"Manufacturing Partner Not Secured",body:"Cabinet maker relationships have not been established. Lead times, minimum order quantities, and production costs are unknown and material variables to the business model."},
        ]} />
      </Section>
    </>
  );
}
